<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" font-family="Inter, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d3b1f"/>
      <stop offset="50%" stop-color="#1b5e20"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#a5d6a7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a5d6a7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="phoneScreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f8e9"/>
    </linearGradient>
    <filter id="phoneShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20"/>
      <feOffset dx="0" dy="20" result="offset"/>
      <feFlood flood-color="#000" flood-opacity="0.4"/>
      <feComposite in2="offset" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bgGradient)"/>
  <rect width="1920" height="1080" fill="url(#glow)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#fff" stroke-width="1">
    <line x1="0" y1="270" x2="1920" y2="270"/>
    <line x1="0" y1="540" x2="1920" y2="540"/>
    <line x1="0" y1="810" x2="1920" y2="810"/>
    <line x1="480" y1="0" x2="480" y2="1080"/>
    <line x1="960" y1="0" x2="960" y2="1080"/>
    <line x1="1440" y1="0" x2="1440" y2="1080"/>
  </g>

  <!-- Main title -->
  <text x="120" y="280" font-size="120" font-weight="800" fill="#ffffff" letter-spacing="-2">
    MediBoussole
  </text>
  <text x="120" y="350" font-size="36" font-weight="400" fill="#a5d6a7" letter-spacing="2">
    TRIAGE IMCI HORS-LIGNE · POWERED BY GEMMA 4
  </text>

  <!-- Tagline -->
  <text x="120" y="500" font-size="48" font-weight="300" fill="#ffffff" opacity="0.95">
    3,5 millions d'agents de santé.
  </text>
  <text x="120" y="560" font-size="48" font-weight="300" fill="#ffffff" opacity="0.95">
    Un téléphone à 150 €.
  </text>
  <text x="120" y="620" font-size="48" font-weight="700" fill="#ffeb3b">
    Zéro internet requis.
  </text>

  <!-- Stats badges -->
  <g transform="translate(120, 730)">
    <rect width="220" height="110" rx="14" fill="#ffffff" opacity="0.12" stroke="#a5d6a7" stroke-width="2"/>
    <text x="110" y="55" text-anchor="middle" font-size="40" font-weight="800" fill="#ffeb3b">100%</text>
    <text x="110" y="88" text-anchor="middle" font-size="16" fill="#ffffff">offline</text>
  </g>

  <g transform="translate(360, 730)">
    <rect width="220" height="110" rx="14" fill="#ffffff" opacity="0.12" stroke="#a5d6a7" stroke-width="2"/>
    <text x="110" y="55" text-anchor="middle" font-size="40" font-weight="800" fill="#ffeb3b">~3 GB</text>
    <text x="110" y="88" text-anchor="middle" font-size="16" fill="#ffffff">RAM Gemma 4 E4B</text>
  </g>

  <g transform="translate(600, 730)">
    <rect width="220" height="110" rx="14" fill="#ffffff" opacity="0.12" stroke="#a5d6a7" stroke-width="2"/>
    <text x="110" y="55" text-anchor="middle" font-size="40" font-weight="800" fill="#ffeb3b">RAG</text>
    <text x="110" y="88" text-anchor="middle" font-size="16" fill="#ffffff">WHO IMCI ancré</text>
  </g>

  <g transform="translate(840, 730)">
    <rect width="220" height="110" rx="14" fill="#ffffff" opacity="0.12" stroke="#a5d6a7" stroke-width="2"/>
    <text x="110" y="55" text-anchor="middle" font-size="40" font-weight="800" fill="#ffeb3b">JSON</text>
    <text x="110" y="88" text-anchor="middle" font-size="16" fill="#ffffff">Function calling natif</text>
  </g>

  <!-- Right side: stylized phone with triage UI -->
  <g transform="translate(1320, 200)" filter="url(#phoneShadow)">
    <!-- Phone body -->
    <rect width="380" height="720" rx="40" fill="#212121" stroke="#37474f" stroke-width="3"/>
    <rect x="20" y="20" width="340" height="680" rx="22" fill="url(#phoneScreen)"/>

    <!-- Status bar -->
    <text x="40" y="55" font-size="18" font-weight="600" fill="#263238">9:42</text>
    <g transform="translate(290, 38)">
      <rect width="16" height="14" fill="#263238" rx="2"/>
      <rect x="22" y="3" width="4" height="11" fill="#263238" rx="1"/>
      <rect x="32" y="6" width="4" height="8" fill="#263238" rx="1"/>
      <rect x="42" y="9" width="4" height="5" fill="#bdbdbd" rx="1"/>
    </g>
    <!-- Offline badge -->
    <g transform="translate(40, 70)">
      <rect width="100" height="26" rx="13" fill="#2e7d32"/>
      <text x="50" y="18" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">HORS LIGNE</text>
    </g>

    <!-- App title -->
    <text x="40" y="140" font-size="22" font-weight="700" fill="#1b5e20">MediBoussole</text>
    <text x="40" y="162" font-size="13" fill="#546e7a">Triage IMCI</text>

    <!-- TRIAGE ROUGE banner -->
    <g transform="translate(40, 195)">
      <rect width="300" height="100" rx="10" fill="#ffebee" stroke="#c62828" stroke-width="3"/>
      <text x="150" y="42" text-anchor="middle" font-size="22" font-weight="800" fill="#b71c1c">🚨 TRIAGE ROUGE</text>
      <text x="150" y="68" text-anchor="middle" font-size="13" fill="#b71c1c">Référer immédiatement</text>
      <text x="150" y="86" text-anchor="middle" font-size="11" fill="#880e4f">Source : WHO IMCI p.7</text>
    </g>

    <!-- Patient info -->
    <g transform="translate(40, 320)">
      <text font-size="14" font-weight="700" fill="#263238">Patient</text>
      <text y="22" font-size="13" fill="#37474f">F · 14 mois · MUAC 11.2 cm</text>
      <text y="42" font-size="13" fill="#37474f">Fièvre 39.2°C · léthargie</text>
    </g>

    <!-- SMS preview -->
    <g transform="translate(40, 410)">
      <rect width="300" height="120" rx="10" fill="#e8f5e9" stroke="#2e7d32"/>
      <text x="14" y="22" font-size="13" font-weight="700" fill="#1b5e20">📨 SMS de référence (auto)</text>
      <text x="14" y="46" font-size="11" fill="#1b5e20">[MEDIBOUSSOLE] Patient F 14m,</text>
      <text x="14" y="62" font-size="11" fill="#1b5e20">fièvre 39.2 + léthargie + MUAC</text>
      <text x="14" y="78" font-size="11" fill="#1b5e20">11.2 → TRIAGE ROUGE,</text>
      <text x="14" y="94" font-size="11" fill="#1b5e20">ETA 25min via moto.</text>
      <text x="14" y="112" font-size="10" font-style="italic" fill="#558b2f">Envoyé via 2G ✓</text>
    </g>

    <!-- Sources cited -->
    <g transform="translate(40, 555)">
      <text font-size="12" font-weight="700" fill="#37474f">Sources RAG :</text>
      <text y="20" font-size="11" fill="#546e7a">• WHO IMCI Chart Booklet p. 7</text>
      <text y="36" font-size="11" fill="#546e7a">• WHO IMCI Chart Booklet p. 12</text>
    </g>

    <!-- Confidence -->
    <g transform="translate(40, 625)">
      <text font-size="12" fill="#37474f">Confiance modèle</text>
      <rect y="10" width="220" height="8" rx="4" fill="#eceff1"/>
      <rect y="10" width="220" height="8" rx="4" fill="#2e7d32"/>
      <text x="240" y="18" font-size="12" font-weight="700" fill="#1b5e20">100%</text>
    </g>
  </g>

  <!-- Footer -->
  <g transform="translate(120, 970)">
    <text font-size="20" font-weight="600" fill="#a5d6a7">The Gemma 4 Good Hackathon</text>
    <text y="30" font-size="14" fill="#ffffff" opacity="0.7">Open source · CC-BY 4.0 · Built on Gemma 4 E4B + Ollama</text>
  </g>
</svg>
