[theme]
base = "light"
primaryColor = "#2e7d32"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f1f8e9"
textColor = "#263238"
font = "sans serif"

[browser]
gatherUsageStats = false

[server]
headless = true
runOnSave = false
fileWatcherType = "none"

[client]
showErrorDetails = false
toolbarMode = "minimal"
